<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/mobile.css">
    <link rel="icon" href="./assets/icons/favicon.jpg" type="image/png">

    <title>Quiz App</title>
</head>
<body onload="init()">
    <h1>Quiz App</h1>
    <div class="space"></div>
    <div class="container">
        <div class="card">
            <div class="card-body" id="quizActive">
                <h5 class="card-title" id="questionText">Frage</h5>
                <div class="mb-3">
                    <div class="answer" id="answer_1" onclick="answer('answer_1')">
                        Antwort
                    </div>
                </div>
                <div class="mb-3">
                    <div class="answer" id="answer_2" onclick="answer('answer_2')">
                        Antwort
                    </div>
                </div>
                <div class="mb-3">
                    <div class="answer" id="answer_3" onclick="answer('answer_3')">
                        Antwort
                    </div>
                </div>
                <div class="mb-3">
                    <div class="answer" id="answer_4" onclick="answer('answer_4')">
                        Antwort
                    </div>
                </div>
                <div class="progress bg-bar">
                    <div class="progress-bar" id="progress" role="progressbar" style="width: 0%;"></div>
                </div>
                <div class="footer">
                    <span class="text-line">
                        <p><b id="counter">1</b> von <b id="allQuestions"></b> Fragen</p>
                    </span>
                    <div>
                        <button onclick="nextQuestion()" class="btn-custom" id="nextButton" disabled>Nächste Frage</button>
                    </div>
                </div>
            </div>
            <div class="card-body" id="quizCompleted" style="display: none;">
                <h5 class="card-title">Glückwunsch, das Quiz ist beendet!</h5>
                <img class="quiz-completed text-center" src="./assets/icons/quiz-completed.png" alt="Party Icon" height="60px">
                <span class="text-line">
                    <p>Du hast <b id="counterRightQuestions">1</b> von <b id="finalQuestions">10</b> Fragen richtig beantwortet.</p>
                </span>
                <div>
                    <button onclick="newGame()" class="new-btn-custom" id="newGame">Erneut spielen</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./scripts/data.js"></script>
    <script src="./script.js"></script>
</body>
</html>
